diffusion:
  timesteps: 500
  beta_start: 0.0001
  beta_end: 0.02

training:
  batch_size: 32
  epochs: 100
  learning_rate: 1e-4
  device: "cuda"
  data_dir: "./data"
  save_path: "./saves"
  num_workers: 4
  logs: "./logs/train-logs"

inference:
  model_path: "./saves/a.pth"
  device: "cuda"
  logs: "./logs/inference-logs"

api:
  host: "localhost"
  port: 8000
  reload: True

preprocessing:
  data_dir: "./data/plane"
  save_dir: "./data"

model:
  im_channels : 1 #1 for grayscale, 3 for RGB
  im_size : 28
  down_channels : [64, 128, 256, 512]
  mid_channels : [512, 512, 256]
  down_sample : [True, True, False]
  time_emb_dim : 128
  num_down_layers : 2
  num_mid_layers : 2
  num_up_layers : 2
  num_heads : 8
